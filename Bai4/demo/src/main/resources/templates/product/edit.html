<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{_layout}">
<head>
    <title>Edit Product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-4">Edit Product</h2>
    <hr />
    
    <form th:action="@{/products/edit}" th:object="${product}" method="post" class="form" enctype="multipart/form-data">
        
        <input type="hidden" th:field="*{id}" />

        <div class="form-group mb-3">
            <label for="name" class="form-label">Name:</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
            <div class="alert alert-warning mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="price" class="form-label">Price:</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
            <div class="alert alert-warning mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="image" class="form-label">Image:</label>
            <div class="mb-2" th:if="*{image != null}">
                <img th:src="@{'/images/' + *{image}}" width="150" class="img-thumbnail" alt="Current Image">
                <p class="small text-muted">Current image: <span th:text="*{image}"></span></p>
            </div>
            
            <input class="form-control" type="file" id="image" name="imageProduct" accept="image/png,image/jpeg">
            <small class="text-muted">Leave empty to keep the current image.</small>
        </div>

        <div class="form-group mb-3">
            <label for="category" class="form-label">Category:</label>
            <select th:field="*{category.id}" class="form-control" id="category">
                <option th:each="category : ${categories}" 
                        th:value="${category.id}" 
                        th:text="${category.name}"
                        th:selected="${category.id == product.category.id}">
                </option>
            </select>
            <div class="alert alert-warning mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
        </div>

        <div class="mt-4">
            <input type="submit" class="btn btn-primary" value="Update Product">
            <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
