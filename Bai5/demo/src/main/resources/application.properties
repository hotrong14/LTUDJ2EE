spring.application.name=DemoApplication
server.port=8082

# Cập nhật đúng tên DB là j2ee_bai5 (viết thường theo HeidiSQL)
spring.datasource.url=jdbc:mysql://localhost:3306/j2ee_bai5
# User mặc định của Laragon là root
spring.datasource.username=root
# Password mặc định của Laragon là để trống
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Các cấu hình giao diện
spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.jpa.hibernate.ddl-auto=update
