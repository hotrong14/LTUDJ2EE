<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<div layout:fragment="content">

    <div class="card p-4">
        <h2 class="mb-4 text-danger fw-bold">Chỉnh sửa sản phẩm</h2>

        <form th:action="@{/products/update/{id}(id=${product.id})}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Giá</label>
                <input type="number" th:field="*{price}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Danh mục</label>
                <select name="categoryId" class="form-select" required>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${product.category != null and c.id == product.category.id}">
                    </option>
                </select>
            </div>

            <div class="mb-3" th:if="${product.image != null}">
                <label class="form-label">Ảnh hiện tại</label><br>
                <img th:src="@{'/assets/' + ${product.image} + '?t=' + ${product.id}}"
                        width="120"
                        class="img-thumbnail">
            </div>

            <div class="mb-3">
                <label class="form-label">Chọn ảnh mới (nếu muốn thay đổi)</label>
                <input type="file" name="imageFile" class="form-control">
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    Cập nhật sản phẩm
                </button>
                <a th:href="@{/products}" class="btn btn-secondary">
                    Quay lại danh sách
                </a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
