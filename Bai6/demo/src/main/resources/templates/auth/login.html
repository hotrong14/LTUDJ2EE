<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Gunner Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

:root{
    --arsenal-red:#EF0107;
    --arsenal-dark-red:#B00000;
    --arsenal-white:#FFFFFF;
    --arsenal-light:#F5F5F5;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,var(--arsenal-red),var(--arsenal-dark-red));
    font-family:'Segoe UI',sans-serif;
}

/* LOGIN CARD */

.login-card{
    width:380px;
    padding:40px;
    border-radius:12px;
    background:white;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.login-title{
    text-align:center;
    margin-bottom:25px;
    font-weight:bold;
    color:var(--arsenal-red);
}

/* LOGO */

.logo-login{
    width:70px;
    display:block;
    margin:auto;
    margin-bottom:15px;
    transition:0.3s;
}

.logo-login:hover{
    transform:scale(1.1) rotate(-5deg);
}

/* INPUT */

.form-control{
    border-radius:8px;
}

/* BUTTON */

.btn-login{
    width:100%;
    padding:10px;
    font-weight:500;
    border-radius:8px;
    background-color:var(--arsenal-red);
    border-color:var(--arsenal-red);
}

.btn-login:hover{
    background-color:var(--arsenal-dark-red);
    border-color:var(--arsenal-dark-red);
}

</style>

</head>

<body>

<div class="login-card">
    <img th:src="@{/assets/arsenal.png}" class="logo-login">

<h4 class="login-title">Gunner Store Login</h4>

<form th:action="@{/login}" method="post">

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
    </div>

    <!-- LOGIN ERROR -->

    <div th:if="${param.error}" class="alert alert-danger text-center">
        ❌ Sai tên đăng nhập hoặc mật khẩu
    </div>

    <!-- LOGOUT SUCCESS -->

    <div th:if="${param.logout}" class="alert alert-success text-center">
        ✅ Đăng xuất thành công
    </div>

    <button type="submit" class="btn btn-primary btn-login">
        Login
    </button>

</form>

</div>

</body>
</html>
