<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập – Gunner Store</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --red:      #DB0007;
        --red-dark: #9A0005;
        --red-deep: #6B0004;
        --gold:     #C8A84B;
        --border:   #E0DBD4;
    }

    * { box-sizing:border-box; }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Barlow', sans-serif;
        background: var(--red-deep);
        /* Subtle diagonal stripe texture */
        background-image: repeating-linear-gradient(
            -45deg,
            transparent,
            transparent 40px,
            rgba(0,0,0,0.04) 40px,
            rgba(0,0,0,0.04) 80px
        );
    }

    .login-wrap {
        display: flex;
        width: 820px;
        max-width: 95vw;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* Left panel */
    .login-panel-left {
        flex: 1;
        background: linear-gradient(160deg, var(--red) 0%, var(--red-deep) 100%);
        border-right: 3px solid var(--gold);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 32px;
        color: #fff;
    }

    .panel-logo {
        width: 80px;
        filter: drop-shadow(0 4px 16px rgba(200,168,75,0.5));
        margin-bottom: 20px;
        animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.05); }
    }

    .panel-title {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 800;
        font-size: 1.8rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
    }

    .panel-sub {
        font-size: .85rem;
        opacity: .7;
        text-align: center;
        letter-spacing: .5px;
    }

    .panel-divider {
        width: 40px; height: 3px;
        background: var(--gold);
        border-radius: 2px;
        margin: 20px 0;
    }

    /* Right panel */
    .login-panel-right {
        width: 380px;
        background: #fff;
        padding: 48px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .form-heading {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--red-deep);
        margin-bottom: 28px;
    }

    .form-label {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: .82rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #777;
        margin-bottom: 5px;
    }

    .form-control {
        border: 1.5px solid var(--border);
        border-radius: 7px;
        padding: 10px 14px;
        font-family: 'Barlow', sans-serif;
        font-size: .92rem;
        transition: border-color .2s, box-shadow .2s;
    }

    .form-control:focus {
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(219,0,7,.1);
        outline: none;
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: var(--red);
        border: none;
        border-radius: 7px;
        color: #fff;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background .2s, box-shadow .2s, transform .1s;
        margin-top: 8px;
    }

    .btn-login:hover {
        background: var(--red-dark);
        box-shadow: 0 6px 20px rgba(219,0,7,.3);
        transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); }

    .alert { border-radius: 7px; font-size:.87rem; }

    @media (max-width: 600px) {
        .login-panel-left { display: none; }
        .login-panel-right { width: 100%; padding: 36px 28px; }
    }
</style>
</head>
<body>

<div class="login-wrap">

    <!-- Left: branding -->
    <div class="login-panel-left">
        <img th:src="@{/assets/arsenal.png}" class="panel-logo" alt="Arsenal">
        <div class="panel-title">Gunner Store</div>
        <div class="panel-divider"></div>
        <p class="panel-sub">Cổng vào dành cho<br>thành viên Gunner</p>
    </div>

    <!-- Right: form -->
    <div class="login-panel-right">
        <div class="form-heading">Đăng nhập</div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Nhập username" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Nhập password" required>
            </div>

            <div th:if="${param.error}" class="alert alert-danger py-2 mb-3">
                ✕ &nbsp;Sai tên đăng nhập hoặc mật khẩu
            </div>

            <div th:if="${param.logout}" class="alert alert-success py-2 mb-3">
                ✓ &nbsp;Đăng xuất thành công
            </div>

            <button type="submit" class="btn-login">Đăng nhập →</button>

        </form>
    </div>

</div>

</body>
</html>
