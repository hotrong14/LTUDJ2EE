<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Giỏ hàng – Gunner Store</title>
<style>
    .cart-img { width:72px; height:56px; object-fit:cover; border-radius:6px; }
    .price-cell { font-family:var(--font-display); font-weight:700; color:var(--red); }
    .qty-input { width:70px; text-align:center; }
    .summary-card { border-left:4px solid var(--gold) !important; }
    .total-row { font-family:var(--font-display); font-size:1.25rem; font-weight:800; color:var(--red-deep); }
    .empty-cart { text-align:center; padding:60px 0; }
    .empty-cart .icon { font-size:4rem; }
</style>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Giỏ <span>hàng</span></h1>
        <a th:href="@{/products}" class="btn btn-outline-secondary">← Tiếp tục mua sắm</a>
    </div>

    <!-- Empty -->
    <div th:if="${#lists.isEmpty(cart)}" class="card empty-cart">
        <div class="icon">🛒</div>
        <p class="text-muted mt-2 mb-3">Giỏ hàng của bạn đang trống.</p>
        <a th:href="@{/products}" class="btn btn-primary">Khám phá sản phẩm</a>
    </div>

    <!-- Cart content -->
    <div th:if="${!#lists.isEmpty(cart)}" class="row g-4">

        <!-- Items table -->
        <div class="col-lg-8">
            <div class="card">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                        <tr>
                            <th colspan="2">Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th style="width:160px;">Số lượng</th>
                            <th>Tổng</th>
                            <th style="width:60px;"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cart}">
                            <td style="width:80px;">
                                <img th:src="@{'/assets/' + ${item.image}}" class="cart-img">
                            </td>
                            <td style="font-weight:600;" th:text="${item.productName}"></td>
                            <td class="price-cell"
                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td>
                                <form th:action="@{/cart/update/{id}(id=${item.productId})}"
                                      method="post" class="d-flex align-items-center gap-1">
                                    <input type="number" name="quantity" th:value="${item.quantity}"
                                           min="1" max="100" class="form-control form-control-sm qty-input">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary px-2"
                                            title="Cập nhật">↻</button>
                                </form>
                            </td>
                            <td class="price-cell"
                                th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td>
                                <a th:href="@{/cart/remove/{id}(id=${item.productId})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Xóa sản phẩm này?')"
                                   title="Xóa">✕</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="p-3 border-top d-flex justify-content-between align-items-center">
                    <a th:href="@{/cart/clear}" class="btn btn-outline-secondary btn-sm"
                       onclick="return confirm('Xóa toàn bộ giỏ hàng?')">
                        🗑 Xóa giỏ hàng
                    </a>
                    <span style="font-size:.85rem; color:var(--mid);"
                          th:text="${itemCount} + ' sản phẩm'"></span>
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="col-lg-4">
            <div class="card summary-card p-4 sticky-top" style="top:84px;">
                <h5 style="font-family:var(--font-display);font-weight:800;letter-spacing:1px;
                            text-transform:uppercase;color:var(--red-deep);margin-bottom:20px;">
                    Tổng đơn hàng
                </h5>
                <div class="d-flex justify-content-between mb-2" style="font-size:.9rem;">
                    <span>Tạm tính</span>
                    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </div>
                <div class="d-flex justify-content-between mb-3" style="font-size:.9rem;">
                    <span>Phí vận chuyển</span>
                    <span style="color:#2e7d32; font-weight:600;">Miễn phí</span>
                </div>
                <hr style="border-color:var(--border);">
                <div class="d-flex justify-content-between total-row mb-4">
                    <span>Tổng cộng</span>
                    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </div>
                <a th:href="@{/checkout}" class="btn btn-primary w-100 mb-2" style="font-size:1rem; padding:12px;">
                    Đặt hàng ngay →
                </a>
                <a th:href="@{/products}" class="btn btn-outline-secondary w-100">Tiếp tục mua sắm</a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
