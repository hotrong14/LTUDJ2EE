<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Thanh toán – Gunner Store</title>
<style>
    .checkout-img { width:48px; height:40px; object-fit:cover; border-radius:4px; }
    .summary-card { border-left:4px solid var(--gold) !important; }
    .total-row { font-family:var(--font-display); font-size:1.3rem; font-weight:800; color:var(--red-deep); }
    .step-badge {
        display:inline-flex; align-items:center; justify-content:center;
        width:28px; height:28px; border-radius:50%;
        background:var(--red); color:#fff;
        font-family:var(--font-display); font-weight:800; font-size:.85rem;
        margin-right:8px;
    }
</style>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Xác nhận <span>đơn hàng</span></h1>
    </div>

    <div th:if="${#lists.isEmpty(cart)}" class="alert alert-danger">
        Giỏ hàng trống. <a th:href="@{/products}" class="fw-bold">Quay lại mua sắm →</a>
    </div>

    <div th:if="${!#lists.isEmpty(cart)}" class="row g-4">

        <!-- Order detail -->
        <div class="col-lg-8">
            <div class="card p-4">
                <h6 style="font-family:var(--font-display);font-weight:800;text-transform:uppercase;
                            letter-spacing:1px;color:var(--mid);margin-bottom:16px;">
                    <span class="step-badge">1</span>Chi tiết đơn hàng
                </h6>
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                        <tr>
                            <th colspan="2">Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th>SL</th>
                            <th>Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cart}">
                            <td style="width:56px;">
                                <img th:src="@{'/assets/' + ${item.image}}" class="checkout-img">
                            </td>
                            <td style="font-weight:600;" th:text="${item.productName}"></td>
                            <td style="font-family:var(--font-display); color:var(--mid);"
                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td th:text="${item.quantity}"></td>
                            <td style="font-family:var(--font-display);font-weight:700;color:var(--red);"
                                th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Summary + action -->
        <div class="col-lg-4">
            <div class="card summary-card p-4 sticky-top" style="top:84px;">
                <h6 style="font-family:var(--font-display);font-weight:800;text-transform:uppercase;
                            letter-spacing:1px;color:var(--mid);margin-bottom:16px;">
                    <span class="step-badge">2</span>Tóm tắt
                </h6>
                <div class="d-flex justify-content-between mb-2" style="font-size:.9rem;">
                    <span>Tổng sản phẩm</span>
                    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </div>
                <div class="d-flex justify-content-between mb-3" style="font-size:.9rem;">
                    <span>Phí vận chuyển</span>
                    <span style="color:#2e7d32;font-weight:600;">Miễn phí</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between total-row mb-4">
                    <span>Tổng cộng</span>
                    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </div>

                <form method="post" th:action="@{/checkout}">
                    <button type="submit" class="btn btn-primary w-100 mb-2" style="font-size:1rem;padding:12px;">
                        ✓ Xác nhận đặt hàng
                    </button>
                </form>
                <a th:href="@{/cart}" class="btn btn-outline-secondary w-100">← Quay lại giỏ hàng</a>

                <div class="mt-3 p-3 rounded" style="background:var(--smoke);font-size:.82rem;color:var(--mid);">
                    <strong>Lưu ý:</strong> Đơn hàng sẽ không thể chỉnh sửa sau khi xác nhận.
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
