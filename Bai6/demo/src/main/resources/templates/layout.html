<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI5 - Arsenal Style</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        :root {
            --arsenal-red: #EF0107;
            --arsenal-dark-red: #B00000;
            --arsenal-white: #FFFFFF;
            --arsenal-light: #F5F5F5;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--arsenal-light);
            font-family: 'Segoe UI', sans-serif;
        }

        main {
            flex: 1;
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, var(--arsenal-red), var(--arsenal-dark-red));
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .navbar-brand {
            color: var(--arsenal-white) !important;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .logo-arsenal {
            width: 42px;
            margin-right: 10px;
            transition: 0.3s;
        }

        .logo-arsenal:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .navbar-nav .nav-link {
            color: var(--arsenal-white) !important;
            font-weight: 500;
            transition: 0.3s;
            padding: 8px 14px;
            border-radius: 6px;
        }

        .navbar-nav .nav-link:hover {
            background-color: var(--arsenal-white);
            color: var(--arsenal-red) !important;
        }

        /* BUTTON STYLE */
        .btn-primary,
        .btn-success {
            background-color: var(--arsenal-red);
            border-color: var(--arsenal-red);
            font-weight: 500;
        }

        .btn-primary:hover,
        .btn-success:hover {
            background-color: var(--arsenal-dark-red);
            border-color: var(--arsenal-dark-red);
        }

        /* TABLE HEADER */
        .table-dark {
            background-color: var(--arsenal-red);
        }

        /* CARD SHADOW */
        .card, .table {
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* FOOTER */
        footer {
            background-color: var(--arsenal-red);
            color: var(--arsenal-white);
            font-weight: 500;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" th:href="@{/products}">
            <img th:src="@{/assets/arsenal.png}"
                alt="Arsenal Logo"
                class="logo-arsenal">
            BAI5
        </a>

        <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        Danh sách sản phẩm
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products/add}">
                        Thêm sản phẩm
                    </a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<main class="container mt-4 mb-4">
    <div layout:fragment="content">
    </div>
</main>

<!-- FOOTER -->
<footer class="text-center py-3">
    2026 - Phát triển ứng dụng với J2EE | Gunner Store
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
