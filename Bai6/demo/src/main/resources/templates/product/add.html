<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<div layout:fragment="content">

    <div class="card p-4">
        <h2 class="mb-4 text-danger fw-bold">Thêm sản phẩm mới</h2>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/products}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                Vui lòng sửa các lỗi sau
            </div>

            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control" required>
                <div class="text-danger small" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Giá</label>
                <input type="number" th:field="*{price}" class="form-control" required>
                <div class="text-danger small" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Danh mục</label>
                <select name="categoryId" class="form-select" required>
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${product.category != null and product.category.id == c.id}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Hình ảnh</label>
                <input type="file" name="imageFile" class="form-control">
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    Thêm sản phẩm
                </button>
                <a th:href="@{/products}" class="btn btn-secondary">
                    Quay lại danh sách
                </a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
