<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Thêm sản phẩm – Gunner Store</title>
<style>
    .form-card { max-width: 600px; }
    .preview-img { width:120px; height:90px; object-fit:cover; border-radius:8px;
                   border:2px solid var(--border); display:none; margin-top:10px; }
    .file-hint { font-size:.8rem; color:var(--mid); margin-top:4px; }
</style>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Thêm <span>sản phẩm</span></h1>
        <a th:href="@{/products}" class="btn btn-outline-secondary">← Quay lại</a>
    </div>

    <div class="card form-card p-4">

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/products}" th:object="${product}"
              method="post" enctype="multipart/form-data">

            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger mb-3">
                Vui lòng kiểm tra lại thông tin bên dưới.
            </div>

            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control"
                       placeholder="VD: Áo đấu Arsenal 2024" required>
                <div class="text-danger small mt-1" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Giá (VNĐ)</label>
                <div class="input-group">
                    <input type="number" th:field="*{price}" class="form-control"
                           placeholder="0" min="0" required>
                    <span class="input-group-text" style="font-family:var(--font-display);font-weight:700;">đ</span>
                </div>
                <div class="text-danger small mt-1" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Danh mục</label>
                <select name="categoryId" class="form-select" required>
                    <option value="">— Chọn danh mục —</option>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}" th:text="${c.name}"
                            th:selected="${product.category != null and product.category.id == c.id}">
                    </option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Hình ảnh sản phẩm</label>
                <input type="file" name="imageFile" class="form-control"
                       accept="image/*" id="imgInput">
                <div class="file-hint">PNG, JPG, WEBP — tối đa 5MB</div>
                <img id="imgPreview" class="preview-img" alt="preview">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-5">Lưu sản phẩm</button>
                <a th:href="@{/products}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>

</div>
<script>
document.getElementById('imgInput').addEventListener('change', function () {
    var file = this.files[0];
    if (!file) return;
    var preview = document.getElementById('imgPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
});
</script>
</body>
</html>
