<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Chỉnh sửa sản phẩm – Gunner Store</title>
<style>
    .form-card { max-width:600px; }
    .current-img { width:120px; height:90px; object-fit:cover;
                   border-radius:8px; border:2px solid var(--border); }
    .preview-img { width:120px; height:90px; object-fit:cover; border-radius:8px;
                   border:2px dashed var(--gold); display:none; margin-top:8px; }
    .img-label { font-size:.8rem; color:var(--mid); margin-top:4px; }
</style>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Chỉnh sửa <span>sản phẩm</span></h1>
        <a th:href="@{/products}" class="btn btn-outline-secondary">← Quay lại</a>
    </div>

    <div class="card form-card p-4">
        <form th:action="@{/products/update/{id}(id=${product.id})}"
              th:object="${product}" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Giá (VNĐ)</label>
                <div class="input-group">
                    <input type="number" th:field="*{price}" class="form-control" min="0" required>
                    <span class="input-group-text" style="font-family:var(--font-display);font-weight:700;">đ</span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Danh mục</label>
                <select name="categoryId" class="form-select" required>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}" th:text="${c.name}"
                            th:selected="${product.category != null and c.id == product.category.id}">
                    </option>
                </select>
            </div>

            <div class="mb-3" th:if="${product.image != null}">
                <label class="form-label">Ảnh hiện tại</label><br>
                <img th:src="@{'/assets/' + ${product.image}}" class="current-img"
                     alt="current image">
                <div class="img-label">Tải lên ảnh mới bên dưới để thay thế</div>
            </div>

            <div class="mb-4">
                <label class="form-label">Ảnh mới</label>
                <input type="file" name="imageFile" class="form-control"
                       accept="image/*" id="imgInput">
                <img id="imgPreview" class="preview-img" alt="preview">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-5">Cập nhật</button>
                <a th:href="@{/products}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>

</div>
<script>
document.getElementById('imgInput').addEventListener('change', function () {
    var file = this.files[0];
    if (!file) return;
    var preview = document.getElementById('imgPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
});
</script>
</body>
</html>
