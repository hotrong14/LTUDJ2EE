<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${course.id != null} ? 'Chỉnh sửa học phần' : 'Thêm học phần mới'">Học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill fs-4"></i>
            <span class="fw-bold">EduRegister</span>
            <span class="badge bg-warning text-dark ms-1">Admin</span>
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/courses}">
                    <i class="bi bi-arrow-left me-1"></i>Quay lại
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container py-5" style="max-width:680px">
    <div class="card admin-card">
        <div class="card-header bg-transparent py-3">
            <h4 class="fw-bold mb-0">
                <i class="bi bi-collection me-2 text-primary"></i>
                <span th:text="${course.id != null} ? 'Chỉnh sửa học phần' : 'Thêm học phần mới'">Học phần</span>
            </h4>
        </div>
        <div class="card-body p-4">
            <form th:action="${course.id != null} ? @{/admin/courses/edit/{id}(id=${course.id})} : @{/admin/courses/add}"
                  th:object="${course}" method="post" enctype="multipart/form-data" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label fw-medium">Tên học phần <span class="text-danger">*</span></label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           th:field="*{name}" placeholder="VD: Lập trình Java nâng cao"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <!-- Lecturer -->
                <div class="mb-3">
                    <label class="form-label fw-medium">Giảng viên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('lecturer')} ? 'is-invalid'"
                           th:field="*{lecturer}" placeholder="VD: TS. Nguyễn Văn A"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lecturer')}" th:errors="*{lecturer}"></div>
                </div>

                <!-- Credits & Category -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Số tín chỉ <span class="text-danger">*</span></label>
                        <input type="number" class="form-control"
                               th:classappend="${#fields.hasErrors('credits')} ? 'is-invalid'"
                               th:field="*{credits}" min="1" max="10" placeholder="3"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Danh mục</label>
                        <select class="form-select" th:field="*{category}">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${course.category != null and course.category.id == cat.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Image Upload -->
                <div class="mb-4">
                    <label class="form-label fw-medium">Ảnh minh họa</label>
                    <input type="file" class="form-control" name="imageFile"
                           accept="image/*" onchange="previewImage(this)"/>
                    <div class="form-text">Để trống nếu không muốn thay đổi ảnh</div>

                    <!-- Preview existing image -->
                    <div class="mt-2" th:if="${course.image != null and course.image != ''}">
                        <p class="text-muted small mb-1">Ảnh hiện tại:</p>
                        <img th:src="${course.image}" id="imgPreview"
                             class="img-thumbnail rounded" style="max-height:160px; object-fit:cover"/>
                    </div>
                    <div class="mt-2" th:if="${course.image == null or course.image == ''}">
                        <img id="imgPreview" src="" class="img-thumbnail rounded d-none"
                             style="max-height:160px; object-fit:cover"/>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-2"></i>
                        <span th:text="${course.id != null} ? 'Cập nhật' : 'Thêm mới'">Lưu</span>
                    </button>
                    <a th:href="@{/admin/courses}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-lg me-2"></i>Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function previewImage(input) {
    const preview = document.getElementById('imgPreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.classList.remove('d-none');
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
