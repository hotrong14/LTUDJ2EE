<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${course.id == null} ? 'Thêm học phần' : 'Sửa học phần'">Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<!-- Admin Sidebar -->
<aside class="admin-sidebar">
  <div class="brand">
    <i class="bi bi-mortarboard-fill"></i> EduAdmin
  </div>
  <nav class="mt-3">
    <a th:href="@{/home}" class="nav-link"><i class="bi bi-house"></i> Trang chủ</a>
    <a th:href="@{/admin/course}" class="nav-link active"><i class="bi bi-book"></i> Học phần</a>
    <a href="#" class="nav-link"
       onclick="event.preventDefault(); document.getElementById('logoutForm2').submit()">
      <i class="bi bi-box-arrow-right"></i> Đăng xuất
    </a>
  </nav>
  <form id="logoutForm2" th:action="@{/logout}" method="post" style="display:none">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  </form>
</aside>

<div class="admin-main">
  <div class="admin-topbar">
    <h4>
      <i class="bi bi-pencil-square me-2 text-primary"></i>
      <span th:text="${course.id == null} ? 'Thêm học phần mới' : 'Chỉnh sửa học phần'"></span>
    </h4>
    <a th:href="@{/admin/course}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> Quay lại
    </a>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="table-card">
        <div class="table-header">
          <h5 class="mb-0">
            <i class="bi bi-info-circle me-2 text-primary"></i>Thông tin học phần
          </h5>
        </div>
        <div class="p-4">
          <form th:action="@{/admin/course/save}" th:object="${course}"
                method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}"/>
            <!-- Giữ lại ảnh cũ khi edit -->
            <input type="hidden" th:field="*{image}"/>

            <!-- Tên học phần -->
            <div class="mb-3">
              <label class="form-label fw-medium">
                Tên học phần <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control"
                     th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                     th:field="*{name}" placeholder="Nhập tên học phần"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                   th:errors="*{name}"></div>
            </div>

            <!-- Giảng viên -->
            <div class="mb-3">
              <label class="form-label fw-medium">
                Giảng viên <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control"
                     th:classappend="${#fields.hasErrors('lecturer')} ? 'is-invalid'"
                     th:field="*{lecturer}" placeholder="Tên giảng viên"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('lecturer')}"
                   th:errors="*{lecturer}"></div>
            </div>

            <!-- Số tín chỉ -->
            <div class="mb-3">
              <label class="form-label fw-medium">
                Số tín chỉ <span class="text-danger">*</span>
              </label>
              <input type="number" class="form-control"
                     th:classappend="${#fields.hasErrors('credits')} ? 'is-invalid'"
                     th:field="*{credits}" min="1" max="10" placeholder="1-10"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('credits')}"
                   th:errors="*{credits}"></div>
            </div>

            <!-- Danh mục -->
            <div class="mb-3">
              <label class="form-label fw-medium">Danh mục</label>
              <select class="form-select" th:field="*{category}">
                <option value="">-- Chọn danh mục --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${course.category != null and course.category.id == cat.id}">
                </option>
              </select>
            </div>

            <!-- Hình ảnh -->
            <div class="mb-4">
              <label class="form-label fw-medium">Hình ảnh minh họa</label>
              <!-- Preview ảnh cũ -->
              <div th:if="${course.image != null and !course.image.isEmpty()}" class="mb-2">
                <img th:src="@{'/uploads/' + ${course.image}}"
                     style="height:100px;border-radius:8px;object-fit:cover;" alt="Current"/>
                <small class="text-muted d-block mt-1">Ảnh hiện tại (upload mới để thay thế)</small>
              </div>
              <input type="file" class="form-control" name="imageFile" accept="image/*"/>
              <small class="text-muted">Định dạng: JPG, PNG, GIF. Tối đa 10MB</small>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${course.id == null} ? 'Thêm học phần' : 'Lưu thay đổi'"></span>
              </button>
              <a th:href="@{/admin/course}" class="btn btn-outline-secondary px-4">
                Hủy
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Preview image before upload
document.querySelector('input[name="imageFile"]').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    let preview = document.getElementById('imgPreview');
    if (!preview) {
      preview = document.createElement('img');
      preview.id = 'imgPreview';
      preview.style.cssText = 'height:100px;border-radius:8px;object-fit:cover;margin-top:0.5rem;';
      e.target.parentNode.appendChild(preview);
    }
    preview.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
