<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản lý học phần - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill fs-4"></i>
            <span class="fw-bold">EduRegister</span>
            <span class="badge bg-warning text-dark ms-1">Admin</span>
        </a>
        <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item"><a class="nav-link" th:href="@{/home}"><i class="bi bi-house me-1"></i>Trang chủ</a></li>
            <li class="nav-item">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
                    </button>
                </form>
            </li>
        </ul>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1"><i class="bi bi-collection me-2 text-primary"></i>Quản lý học phần</h1>
            <p class="text-muted mb-0">Thêm, sửa, xóa các học phần trong hệ thống</p>
        </div>
        <a th:href="@{/admin/courses/add}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Thêm học phần mới
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search -->
    <div class="card admin-card mb-4">
        <div class="card-body py-3">
            <form th:action="@{/admin/courses}" method="get" class="d-flex gap-3 flex-wrap">
                <div class="input-group" style="max-width:400px">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" name="keyword"
                           th:value="${keyword}" placeholder="Tìm kiếm theo tên học phần..."/>
                </div>
                <button type="submit" class="btn btn-outline-primary">Tìm kiếm</button>
                <a th:href="@{/admin/courses}" class="btn btn-outline-secondary">Đặt lại</a>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card admin-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover admin-table mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Ảnh</th>
                            <th>Tên học phần</th>
                            <th>Giảng viên</th>
                            <th>Tín chỉ</th>
                            <th>Danh mục</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="course, stat : ${courses}">
                            <td class="text-muted" th:text="${stat.count}">1</td>
                            <td>
                                <img th:src="${course.image != null ? course.image : 'https://picsum.photos/seed/' + course.id + '/60/40'}"
                                     class="rounded" width="60" height="40" style="object-fit:cover" th:alt="${course.name}"/>
                            </td>
                            <td>
                                <span class="fw-medium" th:text="${course.name}">Course Name</span>
                            </td>
                            <td th:text="${course.lecturer}">Lecturer</td>
                            <td>
                                <span class="badge bg-primary-subtle text-primary" th:text="${course.credits} + ' TC'">3 TC</span>
                            </td>
                            <td>
                                <span class="badge bg-secondary-subtle text-secondary"
                                      th:text="${course.category != null ? course.category.name : '-'}">Chung</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center">
                                    <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}"
                                       class="btn btn-sm btn-warning" title="Chỉnh sửa">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post"
                                          onsubmit="return confirm('Xác nhận xóa học phần \'' + this.dataset.name + '\'?')"
                                          th:data-name="${course.name}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-danger" title="Xóa">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${courses == null or courses.empty}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox display-4 d-block mb-2"></i>
                                Chưa có học phần nào
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination pagination-custom">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/courses(page=${currentPage - 1}, keyword=${keyword})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/admin/courses(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/courses(page=${currentPage + 1}, keyword=${keyword})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
