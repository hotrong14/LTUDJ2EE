<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý học phần - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<!-- Admin Sidebar -->
<aside class="admin-sidebar">
  <div class="brand">
    <i class="bi bi-mortarboard-fill"></i> EduAdmin
  </div>
  <nav class="mt-3">
    <a th:href="@{/home}" class="nav-link">
      <i class="bi bi-house"></i> Trang chủ
    </a>
    <a th:href="@{/admin/course}" class="nav-link active">
      <i class="bi bi-book"></i> Học phần
    </a>
    <a th:href="@{/logout}" class="nav-link mt-auto"
       onclick="event.preventDefault(); document.getElementById('logoutForm').submit()">
      <i class="bi bi-box-arrow-right"></i> Đăng xuất
    </a>
  </nav>
  <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  </form>
</aside>

<div class="admin-main">

  <!-- Top Bar -->
  <div class="admin-topbar">
    <h4><i class="bi bi-book me-2 text-primary"></i>Quản lý học phần</h4>
    <a th:href="@{/admin/course/new}" class="btn btn-primary">
      <i class="bi bi-plus-circle me-2"></i>Thêm học phần
    </a>
  </div>

  <!-- Flash -->
  <div th:if="${success}" class="alert alert-success">
    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="alert alert-danger">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
  </div>

  <!-- Search -->
  <div class="table-card mb-3">
    <div class="table-header">
      <h5><i class="bi bi-search me-2"></i>Tìm kiếm</h5>
    </div>
    <div class="p-3">
      <form th:action="@{/admin/course}" method="get">
        <div class="input-group" style="max-width:400px">
          <input type="text" class="form-control" name="keyword"
                 th:value="${keyword}" placeholder="Tên học phần..."/>
          <button class="btn btn-primary" type="submit">
            <i class="bi bi-search"></i>
          </button>
          <a th:href="@{/admin/course}" class="btn btn-outline-secondary">
            <i class="bi bi-x"></i>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <h5>Danh sách học phần (<span th:text="${coursePage.totalElements}">0</span>)</h5>
    </div>
    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Hình ảnh</th>
            <th>Tên học phần</th>
            <th>Giảng viên</th>
            <th>Tín chỉ</th>
            <th>Danh mục</th>
            <th class="text-center">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${coursePage.content.isEmpty()}">
            <td colspan="7" class="text-center py-4 text-muted">
              <i class="bi bi-inbox fs-3 d-block mb-2"></i>Không có học phần nào
            </td>
          </tr>
          <tr th:each="course, stat : ${coursePage.content}">
            <td th:text="${stat.index + 1 + currentPage * 10}">1</td>
            <td>
              <img th:if="${course.image != null and !course.image.isEmpty()}"
                   th:src="@{'/uploads/' + ${course.image}}"
                   class="course-thumb" alt="img"/>
              <div th:unless="${course.image != null and !course.image.isEmpty()}"
                   class="course-thumb d-flex align-items-center justify-content-center"
                   style="background:#eef2ff;">
                <i class="bi bi-book text-primary"></i>
              </div>
            </td>
            <td class="fw-medium" th:text="${course.name}">Tên</td>
            <td th:text="${course.lecturer}">GV</td>
            <td>
              <span class="badge bg-primary rounded-pill" th:text="${course.credits} + ' TC'"></span>
            </td>
            <td>
              <span class="badge bg-light text-dark border"
                    th:text="${course.category != null} ? ${course.category.name} : 'N/A'"></span>
            </td>
            <td class="text-center">
              <a th:href="@{'/admin/course/edit/' + ${course.id}}"
                 class="btn btn-outline-primary btn-sm me-1">
                <i class="bi bi-pencil"></i>
              </a>
              <button type="button" class="btn btn-outline-danger btn-sm"
                      th:data-id="${course.id}"
                      th:data-name="${course.name}"
                      onclick="confirmDelete(this)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 1}" class="p-3 border-top">
      <nav>
        <ul class="pagination justify-content-center mb-0">
          <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/course(page=${currentPage-1}, keyword=${keyword})}">
              <i class="bi bi-chevron-left"></i>
            </a>
          </li>
          <li class="page-item"
              th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
              th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link"
               th:href="@{/admin/course(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}">1</a>
          </li>
          <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/course(page=${currentPage+1}, keyword=${keyword})}">
              <i class="bi bi-chevron-right"></i>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold text-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>Xác nhận xóa
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Bạn có chắc muốn xóa học phần <strong id="deleteCourseName"></strong>?
        <br/><small class="text-muted">Hành động này không thể hoàn tác.</small>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <form id="deleteForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Xóa
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function confirmDelete(btn) {
  const id = btn.getAttribute('data-id');
  const name = btn.getAttribute('data-name');
  document.getElementById('deleteCourseName').textContent = name;
  document.getElementById('deleteForm').action = '/admin/course/delete/' + id;
  new bootstrap.Modal(document.getElementById('deleteModal')).show();
}
</script>
</body>
</html>
