<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập - EduRegister</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">

    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-mortarboard-fill"></i></div>
      <h2 class="fw-bold mt-3">EduRegister</h2>
      <p class="text-muted">Đăng nhập vào tài khoản của bạn</p>
    </div>

    <!-- Alerts -->
    <div th:if="${error}" class="alert alert-danger py-2">
      <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success py-2">
      <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${logout}" class="alert alert-info py-2">
      <i class="bi bi-info-circle me-2"></i><span th:text="${logout}"></span>
    </div>

    <!-- Form -->
    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="mb-3">
        <label class="form-label fw-medium">Tên đăng nhập</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username"
                 placeholder="Nhập tên đăng nhập" required autofocus/>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium">Mật khẩu</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password"
                 id="passwordInput" placeholder="Nhập mật khẩu" required/>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
      </button>
    </form>

    <div class="divider-text"><span>hoặc</span></div>

    <!-- Google OAuth2 -->
    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 mb-4">
      <svg class="google-icon me-2" viewBox="0 0 24 24" width="20" height="20">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Đăng nhập với Google
    </a>

    <p class="text-center text-muted mb-0">
      Chưa có tài khoản?
      <a th:href="@{/register}" class="text-primary fw-medium">Đăng ký ngay</a>
    </p>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
