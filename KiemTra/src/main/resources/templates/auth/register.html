<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng ký - EduRegister</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">

    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-person-plus-fill"></i></div>
      <h2 class="fw-bold mt-3">Tạo tài khoản</h2>
      <p class="text-muted">Đăng ký để bắt đầu học ngay hôm nay</p>
    </div>

    <div th:if="${error}" class="alert alert-danger py-2">
      <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" th:object="${student}" method="post" novalidate>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-medium">Tên đăng nhập <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control"
                 th:classappend="${#fields.hasErrors('username') or usernameError != null} ? 'is-invalid'"
                 th:field="*{username}" placeholder="Ít nhất 3 ký tự" required/>
        </div>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}"
             th:errors="*{username}"></div>
        <div class="invalid-feedback d-block" th:if="${usernameError}" th:text="${usernameError}"></div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control"
                 th:classappend="${#fields.hasErrors('email') or emailError != null} ? 'is-invalid'"
                 th:field="*{email}" placeholder="your@email.com" required/>
        </div>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
        <div class="invalid-feedback d-block" th:if="${emailError}" th:text="${emailError}"></div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="form-label fw-medium">Mật khẩu <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" th:field="*{password}"
                 id="regPassword" placeholder="Ít nhất 6 ký tự" required minlength="6"/>
          <button class="btn btn-outline-secondary" type="button" onclick="toggleRegPassword()">
            <i class="bi bi-eye" id="regEyeIcon"></i>
          </button>
        </div>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
        <i class="bi bi-person-check me-2"></i>Đăng ký tài khoản
      </button>
    </form>

    <p class="text-center text-muted mb-0">
      Đã có tài khoản?
      <a th:href="@{/login}" class="text-primary fw-medium">Đăng nhập</a>
    </p>
  </div>
</div>

<script>
function toggleRegPassword() {
  const input = document.getElementById('regPassword');
  const icon = document.getElementById('regEyeIcon');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
