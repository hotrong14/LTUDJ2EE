<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">
      <i class="bi bi-mortarboard-fill"></i> EduRegister
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <!-- Search -->
      <form class="search-form ms-3 me-auto" th:action="@{/home}" method="get">
        <div class="input-group">
          <input type="text" class="form-control" name="keyword"
                 th:value="${keyword}" placeholder="Tìm học phần..."/>
          <button class="btn-search" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>

      <ul class="navbar-nav align-items-center gap-1">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/home}">
            <i class="bi bi-house me-1"></i>Trang chủ
          </a>
        </li>

        <!-- STUDENT only -->
        <li class="nav-item" sec:authorize="hasRole('STUDENT')">
          <a class="nav-link" th:href="@{/my-course}">
            <i class="bi bi-journal-bookmark me-1"></i>Học phần của tôi
          </a>
        </li>

        <!-- ADMIN only -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/course}">
            <i class="bi bi-shield-check me-1"></i>Quản trị
          </a>
        </li>

        <!-- Not logged in -->
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="nav-link" th:href="@{/login}">
            <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
          </a>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="btn btn-primary btn-sm ms-1" th:href="@{/register}">Đăng ký</a>
        </li>

        <!-- Logged in -->
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
             href="#" data-bs-toggle="dropdown">
            <div class="avatar-badge"
                 th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</div>
            <span th:text="${#authentication.name}"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow">
            <!-- STUDENT menu items -->
            <li sec:authorize="hasRole('STUDENT')">
              <a class="dropdown-item" th:href="@{/my-course}">
                <i class="bi bi-journal-bookmark me-2"></i>Học phần của tôi
              </a>
            </li>
            <!-- ADMIN menu items -->
            <li sec:authorize="hasRole('ADMIN')">
              <a class="dropdown-item" th:href="@{/admin/course}">
                <i class="bi bi-shield-check me-2"></i>Quản lý học phần
              </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
              <a class="dropdown-item" th:href="@{/admin/course/new}">
                <i class="bi bi-plus-circle me-2"></i>Thêm học phần
              </a>
            </li>
            <li><hr class="dropdown-divider"/></li>
            <li>
              <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="dropdown-item text-danger">
                  <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                </button>
              </form>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ===== FLASH MESSAGES FRAGMENT ===== -->
<div th:fragment="flash">
  <div class="flash-container" th:if="${success != null or warning != null or error != null}">
    <div th:if="${success}" class="flash-toast alert-success">
      <i class="bi bi-check-circle-fill fs-5"></i>
      <span th:text="${success}"></span>
    </div>
    <div th:if="${warning}" class="flash-toast alert-warning">
      <i class="bi bi-exclamation-circle-fill fs-5"></i>
      <span th:text="${warning}"></span>
    </div>
    <div th:if="${error}" class="flash-toast alert-danger">
      <i class="bi bi-x-circle-fill fs-5"></i>
      <span th:text="${error}"></span>
    </div>
  </div>
</div>

</html>
