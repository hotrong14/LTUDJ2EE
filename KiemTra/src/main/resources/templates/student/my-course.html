<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Học phần của tôi - EduRegister</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/navbar :: flash}"></div>

<!-- Page Header -->
<section class="my-courses-header">
  <div class="container">
    <h2 class="fw-bold mb-1">
      <i class="bi bi-journal-bookmark-fill me-2"></i>Học phần của tôi
    </h2>
    <p class="mb-0 opacity-90">
      Xin chào, <strong sec:authentication="name">Student</strong>!
      Bạn đã đăng ký <strong th:text="${enrollments.size()}">0</strong> học phần.
    </p>
  </div>
</section>

<main class="container py-4">

  <!-- Empty State -->
  <div th:if="${enrollments.isEmpty()}" class="empty-state">
    <i class="bi bi-journal-x d-block"></i>
    <h5>Bạn chưa đăng ký học phần nào</h5>
    <p class="text-muted">Hãy khám phá và đăng ký các học phần ngay hôm nay!</p>
    <a th:href="@{/home}" class="btn btn-primary mt-2">
      <i class="bi bi-grid-3x3-gap me-2"></i>Xem tất cả học phần
    </a>
  </div>

  <!-- Enrollment List -->
  <div th:unless="${enrollments.isEmpty()}">
    <div class="row">
      <div class="col-12 col-lg-8">
        <div th:each="enrollment, stat : ${enrollments}" class="enrollment-card">
          <div class="enrollment-icon">
            <i class="bi bi-book-half"></i>
          </div>
          <div class="enrollment-info">
            <div class="course-name" th:text="${enrollment.course.name}">Tên học phần</div>
            <div class="meta">
              <i class="bi bi-person-workspace me-1"></i>
              <span th:text="${enrollment.course.lecturer}">Giảng viên</span>
              &nbsp;·&nbsp;
              <i class="bi bi-award me-1"></i>
              <span th:text="${enrollment.course.credits} + ' tín chỉ'">3 tín chỉ</span>
              <span th:if="${enrollment.course.category != null}">
                &nbsp;·&nbsp;
                <i class="bi bi-tag me-1"></i>
                <span th:text="${enrollment.course.category.name}"></span>
              </span>
            </div>
          </div>
          <div class="enrollment-date">
            <div class="badge bg-success mb-1">Đã đăng ký</div>
            <div th:if="${enrollment.enrollDate != null}"
                 th:text="${#temporals.format(enrollment.enrollDate, 'dd/MM/yyyy')}">
            </div>
          </div>
        </div>
      </div>

      <!-- Summary Card -->
      <div class="col-12 col-lg-4">
        <div class="stat-card flex-column align-items-start" style="position:sticky;top:80px;">
          <div class="d-flex align-items-center gap-3 mb-3 w-100">
            <div class="icon purple"><i class="bi bi-mortarboard"></i></div>
            <div>
              <div class="num" th:text="${enrollments.size()}">0</div>
              <div class="label">Học phần đã đăng ký</div>
            </div>
          </div>
          <div class="d-flex align-items-center gap-3 w-100">
            <div class="icon cyan"><i class="bi bi-award"></i></div>
            <div>
              <div class="num" th:text="${totalCredits}">0</div>
              <div class="label">Tổng tín chỉ</div>
            </div>
          </div>
          <a th:href="@{/home}" class="btn btn-primary w-100 mt-3">
            <i class="bi bi-plus-circle me-2"></i>Đăng ký thêm học phần
          </a>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="text-center py-4 mt-4" style="border-top:1px solid #e2e8f0;color:#64748b;font-size:.85rem;">
  <div class="container">
    <i class="bi bi-mortarboard-fill text-primary me-1"></i>
    <strong>EduRegister</strong> &copy; 2024
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
